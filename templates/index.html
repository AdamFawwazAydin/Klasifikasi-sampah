<!DOCTYPE html>
<html>
<head>
    <title>Klasifikasi Sampah</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            text-align: center;
            transition: 0.3s;
        }

        h1 {
            color: #2c3e50;
        }

        .container {
            background: white;
            padding: 20px;
            margin: auto;
            width: 700px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .row {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .box {
            margin: 10px;
        }

        video, canvas, img {
            width: 280px;
            height: auto;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            color: #27ae60;
        }

        hr {
            margin: 20px 0;
        }

        /* ================= DARK MODE ================= */
        .dark {
            background: #1e1e1e;
            color: #ffffff;
        }

        .dark .container {
            background: #2c2c2c;
            box-shadow: none;
        }

        .dark h1 {
            color: #ecf0f1;
        }

        .dark button {
            background: #444;
        }

        .dark button:hover {
            background: #666;
        }

        .dark #result {
            color: #2ecc71;
        }

        .dark video,
        .dark canvas,
        .dark img {
            border: 2px solid #555;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Klasifikasi Sampah</h1>

    <!-- DARK MODE BUTTON -->
    <button onclick="toggleDarkMode()">🌙 / ☀️ Mode</button>

    <!-- ================= WEBCAM ================= -->
    <h3>📹 Webcam</h3>

    <button onclick="startCamera()">Start Kamera</button>
    <button onclick="capture()">Ambil Gambar</button>

    <div class="row">
        <div class="box">
            <p>Kamera</p>
            <video id="video" autoplay></video>
        </div>

        <div class="box">
            <p>Hasil Capture</p>
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <hr>

    <!-- ================= UPLOAD ================= -->
    <h3>📂 Upload Gambar</h3>

    <input type="file" id="fileInput">
    <br><br>
    <button onclick="uploadImage()">Upload & Prediksi</button>

    <br><br>
    <img id="preview" style="display:none;">

    <!-- ================= HASIL ================= -->
    <h2 id="result">Hasil: -</h2>

</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const resultText = document.getElementById('result');
const preview = document.getElementById('preview');

// ================= CAMERA =================
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        video.srcObject = stream;
    })
    .catch(err => alert("Kamera error: " + err));
}

// ================= CAPTURE =================
function capture() {
    if (video.videoWidth === 0) {
        alert("Kamera belum siap!");
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const dataURL = canvas.toDataURL('image/png');

    fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ image: dataURL })
    })
    .then(res => res.json())
    .then(data => {
        resultText.innerText =
            "Hasil: " + data.label +
            " | Confidence: " + (data.confidence * 100).toFixed(2) + "%";
    });
}

// ================= UPLOAD =================
function uploadImage() {
    const file = document.getElementById('fileInput').files[0];

    if (!file) {
        alert("Pilih gambar dulu!");
        return;
    }

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    const formData = new FormData();
    formData.append("file", file);

    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        resultText.innerText =
            "Hasil: " + data.label +
            " | Confidence: " + (data.confidence * 100).toFixed(2) + "%";
    });
}

// ================= DARK MODE =================
function toggleDarkMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// load theme saat buka
window.onload = () => {
    const theme = localStorage.getItem("theme");
    if (theme === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
